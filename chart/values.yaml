replicaCount: 1

image:
  repository: ghcr.io/forterro/mcp-gitlab-server
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# -- GitLab MCP server configuration (non-sensitive)
config:
  PORT: "3000"
  USE_SSE: "true"
  USE_STREAMABLE_HTTP: "false"
  GITLAB_API_URL: "https://gitlab.com/api/v4"
  GITLAB_READ_ONLY_MODE: "false"
  # -- Authentication mode: "pat" (default) or "oauth"
  # "pat"   : static token from GITLAB_PERSONAL_ACCESS_TOKEN env var / existingSecret
  # "oauth" : per-connection Bearer token forwarded in the SSE Authorization header
  #           (requires USE_SSE=true; no static secret needed)
  AUTH_MODE: "pat"

# -- Sensitive values injected as env vars from a Secret.
# Set these or use existingSecret.
secret:
  GITLAB_PERSONAL_ACCESS_TOKEN: ""

# -- Use an existing Secret instead of creating one.
# The Secret must contain the keys listed in secret{} above.
existingSecret: ""

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Extra env vars (list of {name, value} or {name, valueFrom})
extraEnv: []

# -- Extra envFrom (list of secretRef/configMapRef)
extraEnvFrom: []

nodeSelector: {}
tolerations: []
affinity: {}

# -- PodDisruptionBudget (recommended when replicaCount > 1)
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

podAnnotations: {}
podLabels: {}

serviceAccount:
  create: false
  name: ""

# -- Liveness / readiness probes
probes:
  liveness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 30
  readiness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 3
    periodSeconds: 10
